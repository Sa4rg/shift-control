services:
  postgres:
    image: postgres:16
    container_name: shift-control-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shift_control
      POSTGRES_USER: shift_control_user
      POSTGRES_PASSWORD: shift_control_password
    ports:
      - "5432:5432"
    volumes:
      - shift_control_postgres_data:/var/lib/postgresql/data

volumes:
  shift_control_postgres_data:
