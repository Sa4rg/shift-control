spring.application.name=shift-control

# ===============================
# DATABASE
# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5432/shift_control
spring.datasource.username=shift_control_user
spring.datasource.password=shift_control_password

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FLYWAY
# ===============================

spring.flyway.enabled=true
spring.jpa.open-in-view=false

# ===============================
# SERVER
# ===============================

server.port=8080

# ===============================
# JWT
# ===============================

app.jwt.secret=${JWT_SECRET:change-this-secret-in-production-must-be-at-least-32-chars}
app.jwt.access-token-expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}

# ===============================
# ERROR
# ===============================

server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.whitelabel.enabled=false
