spring.application.name=shift-control

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ===============================
# FLYWAY
# ===============================

spring.flyway.enabled=true

# ===============================
# SERVER
# ===============================

# Render provides a PORT env var. Default to 8080 for local development.
server.port=${PORT:8080}

# ===============================
# JWT (overridden by profile-specific files)
# ===============================

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

# ===============================
# FIRST-ADMIN BOOTSTRAP
# ===============================
# Disabled by default in all profiles.
# Enable only during first deploy to a clean DB.
# Disable immediately after the first admin is created.
# See docs/phase-15-db-cloud-bootstrap.md for the full deploy sequence.

app.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.username=${BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.full-name=${BOOTSTRAP_ADMIN_FULL_NAME:Initial Admin}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.fail-if-admin-exists=${BOOTSTRAP_ADMIN_FAIL_IF_EXISTS:false}

# ===============================
# RATE LIMITING (login endpoints)
# ===============================
# Defaults are set in LoginRateLimitProperties. Override per profile if needed.
# In-memory, single-instance only. See docs/phase-15-api-security-hardening.md.
# app.security.rate-limit.login.enabled=true
# app.security.rate-limit.login.window-seconds=60
# app.security.rate-limit.login.staff-max-attempts=10
# app.security.rate-limit.login.admin-max-attempts=5

# ===============================
# ERROR
# ===============================

server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# ===============================
# ACTUATOR / HEALTH
# ===============================
# Expose only the health endpoint. All other actuator endpoints are blocked.
# Render health check path: /actuator/health
# See docs/phase-15-logging-health-observability.md for details.

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# ===============================
# LOGGING
# ===============================
# Console-based logging for Render. Format defined in logback-spring.xml.
# requestId (from RequestIdFilter MDC) is included in log output.

logging.level.root=INFO
logging.level.com.shiftcontrol.backend=INFO
logging.level.org.springframework.security=WARN
server.error.whitelabel.enabled=false
