# ===============================
# JWT (safe test secret — overrides base)
# ===============================

app.jwt.secret=test-jwt-secret-must-be-at-least-32-bytes-long
app.jwt.access-token-expiration-seconds=3600

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# CORS
# ===============================

app.cors.allowed-origins=http://localhost:8080

# ===============================
# RATE LIMITING
# ===============================
# Disable rate limiting in tests to prevent interference between test runs
app.security.rate-limit.login.enabled=false

# ===============================
# BOOTSTRAP
# ===============================
# Bootstrap is disabled by default (app.bootstrap.admin.enabled defaults to false).
# Explicitly set here to document that tests must never create a bootstrap admin.
app.bootstrap.admin.enabled=false
