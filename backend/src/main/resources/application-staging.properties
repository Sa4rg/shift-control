# ===============================
# DATABASE (Supabase PostgreSQL — env vars required, no fallback)
# ===============================
#
# Supabase connection string format:
#   jdbc:postgresql://<host>:5432/postgres?sslmode=require
#
# Example (do NOT put real credentials here):
#   DATABASE_URL=jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres?sslmode=require
#   DATABASE_USERNAME=postgres
#   DATABASE_PASSWORD=<supabase-db-password>

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# FLYWAY
# ===============================

spring.flyway.enabled=true

# ===============================
# JWT (env vars required — no fallback for secret)
# Default expiration: 43200 seconds (12 hours) for internal build.
# Refresh tokens are not implemented yet; revisit before wider production rollout.
# ===============================

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-seconds=${JWT_EXPIRATION_SECONDS:43200}

# ===============================
# CORS (env var required for staging — validated at startup)
# See CorsValidationConfig for fail-fast enforcement.
# ===============================

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# ===============================
# ERROR (do not expose stack traces in staging)
# ===============================

server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.whitelabel.enabled=false
